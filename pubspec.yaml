name: github_news
description: AI资讯 — 仓库 Star 趋势分析与监控告警客户端。
publish_to: none
version: 1.5.0+5

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.38.1"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9

  # 状态管理
  flutter_riverpod: ^3.3.2

  # 路由
  go_router: ^17.0.0

  # 网络
  dio: ^5.4.3+1

  # RSS/Atom feed 解析(AI 动态补充源)
  xml: ^7.0.1

  # 存储
  shared_preferences: ^2.3.0
  sqflite_common_ffi: ^2.3.3+2
  path: ^1.9.0
  path_provider: ^2.1.4
  flutter_secure_storage: ^10.0.0

  # 图表
  fl_chart: ^1.2.0

  # 外链
  url_launcher: ^6.3.0
  # 7.x 需要 Flutter 3.38.1，并覆盖新版 iOS Scene 与 Windows 链接处理。
  app_links: ^7.2.1

  # 应用内 WebView(链接打开方式 = 应用内时使用)
  flutter_inappwebview: ^6.1.5
  tray_manager: ^0.5.3
  window_manager: ^0.5.2
  local_notifier: ^0.1.6
  supabase_flutter: ^2.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 测试
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - windows/runner/resources/app_icon.ico
    - assets/ai_news/
