name: github_news
description: GitHub情报站 — 仓库 Star 趋势分析与监控告警客户端。
publish_to: none
version: 1.4.0+4

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1

  # 路由
  go_router: ^17.0.0

  # 网络
  dio: ^5.4.3+1

  # RSS/Atom feed 解析(AI 动态补充源)
  xml: ^6.5.0

  # 存储
  shared_preferences: ^2.3.0
  sqflite_common_ffi: ^2.3.3+2
  path: ^1.9.0
  path_provider: ^2.1.4
  flutter_secure_storage: ^10.0.0

  # 图表
  fl_chart: ^1.2.0

  # 外链
  url_launcher: ^6.3.0

  # 应用内 WebView(链接打开方式 = 应用内时使用)
  flutter_inappwebview: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 测试
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
