name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  # ── 静态检查 + 单元测试（多平台矩阵） ──
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  # ── 多平台构建验证 ──
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: apk --debug
            os: ubuntu-latest
            setup-java: true
          - target: ios --no-codesign
            os: macos-latest
          - target: macos --release
            os: macos-latest
          - target: windows --release
            os: windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - if: ${{ matrix.setup-java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build ${{ matrix.target }}
        run: flutter build ${{ matrix.target }}
