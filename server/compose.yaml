services:
  github-news-server:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      GITHUB_NEWS_MASTER_KEY: "${GITHUB_NEWS_MASTER_KEY:?set GITHUB_NEWS_MASTER_KEY}"
      GITHUB_NEWS_SCHEDULER_ENABLED: "true"
      GITHUB_NEWS_INGEST_INTERVAL: "900"
      GITHUB_NEWS_PUSH_INTERVAL: "30"
    volumes:
      - github-news-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  github-news-data:
